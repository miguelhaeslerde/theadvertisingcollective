[build]
command = "npm run build && mkdir -p client/dist && cp -r dist/public/* client/dist/ && cp _redirects client/dist/ 2>/dev/null || true"
cwd = "."
watch_dir = "client/src"

[build.environment_variables]
NODE_VERSION = "20"

[[build.environment_variables]]
name = "NODE_ENV"
value = "production"